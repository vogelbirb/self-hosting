services:
  ntfy:
    image: binwiederhier/ntfy
    container_name: ntfy
    command:
      - serve
    # environment:
    #   - TZ=UTC    # optional: set desired timezone
    # user: 1000:1000 # optional: replace with your own user/group or uid/gid
    networks:
      - web-net
    volumes:
      - ntfy-cache:/var/cache/ntfy
      - ntfy-data:/var/lib/ntfy
    #   - ./conf:/etc/ntfy
    # ports:
    #   - 80:80
    healthcheck: # optional: remember to adapt the host:port to your environment
        test: ["CMD-SHELL", "wget -q --tries=1 http://localhost:80/v1/health -O - | grep -Eo '\"healthy\"\\s*:\\s*true' || exit 1"]
        interval: 60s
        timeout: 10s
        retries: 3
        start_period: 40s
    restart: unless-stopped
    init: true # needed, if healthcheck is used. Prevents zombie processes
    environment:
      NTFY_BASE_URL: https://ntfy.matheuslp.com
      NTFY_CACHE_FILE: /var/lib/ntfy/cache.db
      NTFY_AUTH_FILE: /var/lib/ntfy/auth.db
      NTFY_AUTH_DEFAULT_ACCESS: deny-all
      NTFY_AUTH_USERS: "matheus:${PASSWORD_HASH:?error}:admin"
      NTFY_AUTH_ACCESS: "*:up*:wo"
      NTFY_BEHIND_PROXY: true
      NTFY_ATTACHMENT_CACHE_DIR: /var/lib/ntfy/attachments
      NTFY_ENABLE_LOGIN: true
      NTFY_REQUIRE_LOGIN: true

networks:
  web-net:
    external: true

volumes:
  ntfy-cache:
  ntfy-data:
